um_cke_improvements.ckeditor5.upload_image:
  path: 'cke-improvements/upload-image/{editor}'
  defaults:
    _controller: '\Drupal\um_cke_improvements\Controller\CKEditor5ImageController::upload'
  methods: [POST]
  requirements:
    _entity_access: 'editor.use'
    _custom_access: '\Drupal\um_cke_improvements\Controller\CKEditor5ImageController::imageUploadEnabledAccess'
    _csrf_token: 'TRUE'
  options:
    parameters:
      editor:
        type: entity:editor
